     */
    :root {
      --ss-navy: #1b1b3d;
      --ss-navy-cta: #2c2d5d;
      --ss-yellow: #ffd600;
      --ss-yellow-soft: #fff7e6;
      --ss-cream: #fffdf7;
      --ss-red: #ff4d4d;
      --ss-sky: #e3f2ff;
      --ss-black: #000;
      --stage-w: 1080;
      --stage-h: 1920;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      background: var(--ss-yellow-soft);
      color: var(--ss-navy);
      font-family: "Inter", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 12px 100px;
    }

    h1 {
      font-family: "Bangers", cursive;
      font-size: 1.5rem;
      letter-spacing: 0.06em;
      color: var(--ss-navy);
      margin-bottom: 4px;
      text-align: center;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
      font-family: "Inter", sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--ss-navy);
      max-width: 560px;
    }

    .controls select,
    .controls button {
      background: var(--ss-yellow);
      border: 2px solid var(--ss-black);
      color: var(--ss-navy);
      padding: 8px 12px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--ss-black);
    }

    .controls button:hover,
    .controls select:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 var(--ss-black);
    }

    .hint {
      width: 100%;
      text-align: center;
      font-size: 12px;
      font-family: "Comic Neue", cursive;
      font-weight: 700;
      color: var(--ss-navy);
      opacity: 0.85;
      margin-bottom: 8px;
    }

    .carousel-wrap {
      position: relative;
      width: min(100vw - 24px, (100dvh - 220px) * (9 / 16));
      aspect-ratio: 9 / 16;
      max-height: calc(100dvh - 220px);
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid var(--ss-black);
      box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.2);
      touch-action: pan-y;
    }

    .carousel-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: var(--ss-yellow);
    }

    .carousel-track {
      display: flex;
      height: 100%;
      will-change: transform;
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .slide {
      flex: 0 0 100%;
      height: 100%;
      position: relative;
    }

    /* —— Stage (1080×1920) — homepage energy —— */
    .stage {
      position: absolute;
      inset: 0;
      width: 1080px;
      height: 1920px;
      transform-origin: top left;
      overflow: hidden;
      background: linear-gradient(180deg, #ffe566 0%, var(--ss-yellow) 38%, #ffc400 100%);
      font-family: "Inter", system-ui, sans-serif;
    }

    .ss-zlayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .ss-z {
      position: absolute;
      opacity: 0.35;
    }

    .ss-z path {
      stroke: var(--ss-navy-cta);
      stroke-width: 4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .ss-z.a {
      top: 8%;
      left: 8%;
      width: 100px;
      height: 100px;
    }
    .ss-z.b {
      top: 14%;
      right: 10%;
      width: 120px;
      height: 120px;
    }
    .ss-z.c {
      bottom: 22%;
      left: 6%;
      width: 88px;
      height: 88px;
    }
    .ss-z.d {
      bottom: 18%;
      right: 8%;
      width: 96px;
      height: 96px;
    }

    .ss-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 36px 48px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 2px solid var(--ss-black);
      background: var(--ss-yellow-soft);
    }

    .ss-logo-ring {
      flex-shrink: 0;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 3px solid var(--ss-black);
      background: var(--ss-yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 4px 4px 0 var(--ss-black);
    }

    .ss-logo-ring img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .ss-brand-line {
      font-weight: 900;
      font-size: 36px;
      letter-spacing: -0.02em;
      color: var(--ss-black);
      line-height: 1.1;
    }

    .ss-brand-sub {
      font-family: "Comic Neue", cursive;
      font-weight: 700;
      font-size: 28px;
      color: var(--ss-navy);
      margin-top: 4px;
    }

    .ss-main {
      position: absolute;
      top: 148px;
      bottom: 120px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 40px;
    }

    .ss-card {
      background: var(--ss-cream);
      border: 3px solid var(--ss-black);
      border-radius: 32px;
      box-shadow: 8px 8px 0 var(--ss-black);
      padding: 44px 36px;
      width: 100%;
      max-width: 920px;
      max-height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ss-card-inner {
      width: 100%;
    }

    .ss-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 16px;
      border-top: 2px dashed rgba(27, 27, 61, 0.25);
      background: linear-gradient(0deg, rgba(255, 253, 247, 0.95), transparent);

    .ss-footer-emoji {
      font-size: 42px;
      line-height: 1;
    }

    .ss-footer-url {
      font-weight: 900;
      font-size: 28px;
      color: var(--ss-navy-cta);
      letter-spacing: 0.02em;
    }

    .line {
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 1.08;
      color: var(--ss-navy);
      font-style: italic;
    }

    .line.t96 {
      font-size: 104px;
    }
    .line.t72 {
      font-size: 80px;
    }
    .line.t64 {
      font-size: 70px;
    }
    .line.t56 {
      font-size: 62px;
    }
    .line.t52 {
      font-size: 58px;
    }
    .line.t48 {
      font-size: 54px;
    }
    .line.t44 {
      font-size: 52px;
    }
    .line.mt8 {
      margin-top: 8px;
    }
    .line.mt16 {
      margin-top: 16px;
    }
    .line.mt24 {
      margin-top: 24px;
    }

    .muted {
      color: rgba(27, 27, 61, 0.55);
      font-style: italic;
    }

    .pop-red {
      color: var(--ss-red);
    }

    .pop-navy {
      color: var(--ss-navy-cta);
    }

    .strike {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .emoji-lead {
      font-size: 64px;
      line-height: 1.2;
      display: block;
      margin-bottom: 12px;
      font-style: normal;

    .step-label {
      display: inline-block;
      font-family: "Bangers", cursive;
      font-size: 44px;
      letter-spacing: 0.08em;
      color: var(--ss-navy);
      background: var(--ss-yellow);
      border: 2px solid var(--ss-black);
      border-radius: 12px;
      padding: 6px 18px;
      margin-bottom: 16px;
      box-shadow: 3px 3px 0 var(--ss-black);
    }

    .step-body {

      font-weight: 700;
      font-size: 54px;
      line-height: 1.2;
      letter-spacing: 0.01em;
      text-transform: none;
      font-style: normal;
      color: var(--ss-navy);

      color: #fff;
      border: 3px solid var(--ss-black);
      border-radius: 24px;
      padding: 36px 32px;

    .ss-cta-panel .cta-main {

      font-weight: 700;

      line-height: 1.22;
      text-transform: none;

    .ss-cta-panel .cta-url {

      font-weight: 900;
      font-size: 36px;
      color: var(--ss-yellow);

      font-size: 30px;

    .ss-inline-url {
      margin-top: 28px;
      font-weight: 900;
      font-size: 36px;
      color: var(--ss-navy-cta);

    .dots {

      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;

    .dots button {

      background: #fff;
      cursor: pointer;
      padding: 0;

    .dots button.on {

    .nav-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;

      background: var(--ss-cream);
      border: 2px solid var(--ss-black);

      border-radius: 8px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--ss-black);
      font-family: "Inter", sans-serif;

      max-width: 520px;

      font-size: 12px;
      font-weight: 700;
      color: var(--ss-navy);
      margin-bottom: 8px;
      font-family: "Comic Neue", cursive;

      font-size: 11px;
      line-height: 1.5;
      color: var(--ss-navy);
      white-space: pre-wrap;
      word-break: break-word;
      background: #fff;
      padding: 12px;
      border-radius: 10px;
      border: 2px solid var(--ss-black);
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.12);

    /* Instagram feed carousel: 1080×1350 (4:5) — center-crop from 1080×1920 stage */
    #ig-export-root {

      width: 1080px;
      height: 1350px;
      margin: 0 auto;
      overflow: hidden;
      background: var(--ss-yellow);
      position: relative;
    }

    body.ss-export-mode {
      padding: 0;
      background: #222;
    }

    body.ss-export-mode > *:not(#ig-export-root) {
      display: none !important;
    }

    body.ss-export-mode #ig-export-root {
      display: block !important;
    }

    .ig-crop-wrap {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      position: relative;
      background: var(--ss-yellow);
    }

    .ig-crop-wrap .stage {
      position: absolute;
      left: 0;
      top: -285px;
      width: 1080px;
      height: 1920px;
      transform: none !important;

    function runExportMode() {
      const qs = new URLSearchParams(location.search);
      if (qs.get("export") !== "1") return false;
      const reelId = parseInt(qs.get("reelId"), 10);
      const slideIdx = parseInt(qs.get("slideIdx"), 10);
      const reel = REELS.find((r) => r.id === reelId);
      if (!reel || Number.isNaN(slideIdx) || slideIdx < 0 || slideIdx >= reel.slides.length) {
        const root = document.getElementById("ig-export-root");
        root.style.display = "block";
        root.textContent = "Invalid export params: use reelId=201–215 and slideIdx=0…n-1";
        document.body.classList.add("ss-export-mode");
        return true;
      }
      const root = document.getElementById("ig-export-root");
      root.innerHTML = `<div class="ig-crop-wrap">${reel.slides[slideIdx]}</div>`;
      document.body.classList.add("ss-export-mode");
      document.title = `CG export R${reelId} S${slideIdx + 1}`;
      return true;
    }

    const isExportShot = runExportMode();

    const track = document.getElementById("track");
    const viewport = document.getElementById("viewport");
    const carouselWrap = document.getElementById("carouselWrap");
    const reelSelect = document.getElementById("reelSelect");
    const dotsEl = document.getElementById("dots");
    const captionBox = document.getElementById("captionBox");
    const btnPrev = document.getElementById("btnPrev");
    const btnNext = document.getElementById("btnNext");
    const btnPng = document.getElementById("btnPng");

    let reelIndex = 0;
    let slideIndex = 0;
    let touchStartX = null;

    function scaleStages() {
      const r = viewport.getBoundingClientRect();
      const s = Math.min(r.width / STAGE_W, r.height / STAGE_H);
      track.querySelectorAll(".stage").forEach((el) => {
        el.style.transform = `scale(${s})`;
      });
    }

    function buildDots(n) {
      dotsEl.innerHTML = "";
      for (let i = 0; i < n; i++) {
        const b = document.createElement("button");
        b.type = "button";
        b.setAttribute("aria-label", `Slide ${i + 1}`);
        b.addEventListener("click", () => goToSlide(i));
        dotsEl.appendChild(b);
      }
    }

    function updateDots() {
      [...dotsEl.children].forEach((b, i) => b.classList.toggle("on", i === slideIndex));
    }

    function renderReel() {
      const reel = REELS[reelIndex];
      track.innerHTML = reel.slides.map((html) => `<div class="slide">${html}</div>`).join("");
      slideIndex = 0;
      buildDots(reel.slides.length);
      captionBox.textContent = reel.caption;
      applyTransform();
      updateDots();
      requestAnimationFrame(() => scaleStages());
    }

    function applyTransform() {
      track.style.transform = `translateX(-${slideIndex * 100}%)`;
    }

    function goToSlide(i) {
      const n = REELS[reelIndex].slides.length;
      slideIndex = Math.max(0, Math.min(n - 1, i));
      applyTransform();
      updateDots();
    }

    function next() {
      const n = REELS[reelIndex].slides.length;
      if (slideIndex < n - 1) goToSlide(slideIndex + 1);
    }

    function prev() {
      if (slideIndex > 0) goToSlide(slideIndex - 1);
    }

    REELS.forEach((r) => {
      const o = document.createElement("option");
      o.value = String(r.id);
      o.textContent = `${r.id}. ${r.title}`;
      reelSelect.appendChild(o);
    });

    reelSelect.addEventListener("change", () => {
      reelIndex = REELS.findIndex((r) => String(r.id) === reelSelect.value);
      renderReel();
    });

    btnNext.addEventListener("click", next);
    btnPrev.addEventListener("click", prev);

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") next();
      if (e.key === "ArrowLeft") prev();
    });

    carouselWrap.addEventListener(
      "touchstart",
      (e) => {
        touchStartX = e.changedTouches[0].screenX;
      },
      { passive: true }
    );

    carouselWrap.addEventListener(
      "touchend",
      (e) => {
        if (touchStartX == null) return;
        const dx = e.changedTouches[0].screenX - touchStartX;
        touchStartX = null;
        if (dx < -48) next();
        if (dx > 48) prev();
      },
      { passive: true }
    );

    function replaceImgsWithSlothEmoji(root) {
      root.querySelectorAll("img").forEach((img) => {
        const w = img.width || img.getAttribute("width") || 72;
        const h = img.height || img.getAttribute("height") || 72;
        const sp = document.createElement("span");
        sp.setAttribute("aria-hidden", "true");
        sp.textContent = "🦥";
        sp.style.cssText = `display:inline-flex;align-items:center;justify-content:center;width:${w}px;height:${h}px;font-size:${Math.min(Number(w), Number(h)) * 0.72}px;line-height:1;`;
        img.replaceWith(sp);
      });
    }

    async function captureSlideToIgPng(stageEl) {
      const clone = stageEl.cloneNode(true);
      clone.style.cssText =
        "position:fixed;left:0;top:0;width:1080px;height:1920px;transform:none!important;z-index:2147483646;opacity:0.01;pointer-events:none;";
      replaceImgsWithSlothEmoji(clone);
      document.body.appendChild(clone);
      await document.fonts.ready;
      await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
      let canvas;
      try {
        canvas = await html2canvas(clone, {
          scale: 1,
          width: STAGE_W,
          height: STAGE_H,
          useCORS: false,
          allowTaint: false,
          backgroundColor: "#ffd600",
          logging: false,
          onclone(clonedDoc) {
            const root = clonedDoc.body?.querySelector(".stage") || clonedDoc.querySelector(".stage");
            if (root) replaceImgsWithSlothEmoji(root);
          },
        });
      } finally {
        clone.remove();
      }
      const out = document.createElement("canvas");
      out.width = IG_W;
      out.height = IG_H;
      const ctx = out.getContext("2d");
      ctx.fillStyle = "#ffd600";
      ctx.fillRect(0, 0, IG_W, IG_H);
      ctx.drawImage(canvas, 0, IG_CROP_Y, IG_W, IG_H, 0, 0, IG_W, IG_H);
      return out;
    }

    btnPng.addEventListener("click", async () => {
      if (typeof html2canvas !== "function") {
        alert("html2canvas failed to load (check network).");
        return;
      }
      const slides = track.querySelectorAll(".slide .stage");
      const stage = slides[slideIndex];
      if (!stage) return;
      btnPng.disabled = true;
      try {
        const out = await captureSlideToIgPng(stage);
        await new Promise((resolve, reject) => {
          out.toBlob(
            (blob) => {
              if (!blob) {
                reject(new Error("toBlob returned null"));
                return;
              }
              const a = document.createElement("a");
              a.href = URL.createObjectURL(blob);
              a.download = `ss-ig-45-cg-r${REELS[reelIndex].id}-slide-${String(slideIndex + 1).padStart(2, "0")}.png`;
              a.click();
              URL.revokeObjectURL(a.href);
              resolve();
            },
            "image/png",
            1
          );
        });
      } catch (err) {
        console.error(err);
        alert(
          "PNG export failed. Tip: run from repo root `npm run export-carousel-slides` for guaranteed exports, or open this page via local HTTP (not file://) so the logo can load without tainting the canvas."
        );
      } finally {
        btnPng.disabled = false;
      }
    });

    if (!isExportShot) {
      new ResizeObserver(() => scaleStages()).observe(viewport);

      reelIndex = 0;
      reelSelect.value = "201";
      renderReel();
    }
  </script>
</body>
</html>
