<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Strategic Sloth — Books &amp; Offers · High-Converting Carousels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:ital,wght@0,400;0,700;1,400&family=Inter:ital,opsz,wght@0,14..32,400..900;1,14..32,400..900&display=swap"
    rel="stylesheet"
  />
  <style>
    /**
     * Tokens: Navy #1B1B3D · Yellow #FFD600 · Cream #FFFDF7 · CTA navy #2C2D5D · Red #FF4D4D
     * Stage: 1080×1350 (native 4:5 — no crop needed)
     */
    :root {
      --ss-navy: #1b1b3d;
      --ss-navy-cta: #2c2d5d;
      --ss-yellow: #ffd600;
      --ss-yellow-soft: #fff7e6;
      --ss-cream: #fffdf7;
      --ss-red: #ff4d4d;
      --ss-sky: #e3f2ff;
      --ss-black: #000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: var(--ss-yellow-soft);
      color: var(--ss-navy);
      font-family: "Inter", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 12px 100px;
    }

    h1 {
      font-family: "Bangers", cursive;
      font-size: 1.5rem;
      letter-spacing: 0.06em;
      color: var(--ss-navy);
      margin-bottom: 4px;
      text-align: center;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
      font-family: "Inter", sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--ss-navy);
      max-width: 600px;
    }

    .controls select,
    .controls button {
      background: var(--ss-yellow);
      border: 2px solid var(--ss-black);
      color: var(--ss-navy);
      padding: 8px 12px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--ss-black);
    }

    .controls button:hover,
    .controls select:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 var(--ss-black);
    }

    .hint {
      width: 100%;
      text-align: center;
      font-size: 12px;
      font-family: "Comic Neue", cursive;
      font-weight: 700;
      color: var(--ss-navy);
      opacity: 0.85;
      margin-bottom: 8px;
    }

    /* ——— Preview carousel wrapper ——— */
    .carousel-wrap {
      position: relative;
      width: min(100vw - 24px, (100dvh - 240px) * (4 / 5));
      aspect-ratio: 4 / 5;
      max-height: calc(100dvh - 240px);
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid var(--ss-black);
      box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.2);
    }

    .carousel-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: var(--ss-yellow);
    }

    .carousel-track {
      display: flex;
      height: 100%;
      will-change: transform;
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .slide {
      flex: 0 0 100%;
      height: 100%;
      position: relative;
    }

    /* ——— Native 4:5 stage (1080×1350) ——— */
    .stage {
      position: absolute;
      inset: 0;
      width: 1080px;
      height: 1350px;
      transform-origin: top left;
      overflow: hidden;
      background: linear-gradient(160deg, #ffe566 0%, var(--ss-yellow) 55%, #ffc400 100%);
      font-family: "Inter", system-ui, sans-serif;
    }

    .ss-zlayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .ss-z {
      position: absolute;
      opacity: 0.28;
    }

    .ss-z path {
      stroke: var(--ss-navy-cta);
      stroke-width: 5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .ss-z.a { top: 6%;  left: 6%;   width: 88px;  height: 88px; }
    .ss-z.b { top: 10%; right: 8%;  width: 110px; height: 110px; }
    .ss-z.c { bottom: 18%; left: 5%;  width: 80px;  height: 80px; }
    .ss-z.d { bottom: 14%; right: 7%; width: 90px;  height: 90px; }

    .ss-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 28px 44px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 2px solid var(--ss-black);
      background: var(--ss-yellow-soft);
    }

    .ss-logo-ring {
      flex-shrink: 0;
      width: 76px; height: 76px;
      border-radius: 50%;
      border: 3px solid var(--ss-black);
      background: var(--ss-yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 4px 4px 0 var(--ss-black);
    }

    .ss-logo-ring img { width: 62px; height: 62px; object-fit: contain; }

    .ss-brand-line {
      font-weight: 900;
      font-size: 32px;
      letter-spacing: -0.02em;
      color: var(--ss-black);
      line-height: 1.1;
    }

    .ss-brand-sub {
      font-family: "Comic Neue", cursive;
      font-weight: 700;
      font-size: 24px;
      color: var(--ss-navy);
      margin-top: 4px;
    }

    .ss-main {
      position: absolute;
      top: 126px; bottom: 108px;
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 44px;
    }

    .ss-card {
      background: var(--ss-cream);
      border: 3px solid var(--ss-black);
      border-radius: 28px;
      box-shadow: 8px 8px 0 var(--ss-black);
      padding: 40px 36px;
      width: 100%;
      max-height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ss-card-inner { width: 100%; }

    .ss-footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 108px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 12px;
      border-top: 2px dashed rgba(27, 27, 61, 0.22);
      background: linear-gradient(0deg, rgba(255, 253, 247, 0.96), transparent);
    }

    .ss-footer-emoji { font-size: 36px; line-height: 1; }
    .ss-footer-url {
      font-weight: 900; font-size: 26px;
      color: var(--ss-navy-cta); letter-spacing: 0.02em;
    }

    /* ——— Text helpers ——— */
    .line {
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 1.08;
      color: var(--ss-navy);
      font-style: italic;
    }

    .line.t96  { font-size: 96px; }
    .line.t80  { font-size: 80px; }
    .line.t68  { font-size: 68px; }
    .line.t60  { font-size: 60px; }
    .line.t52  { font-size: 52px; }
    .line.t44  { font-size: 44px; }
    .line.t36  { font-size: 36px; }
    .line.mt8  { margin-top: 8px; }
    .line.mt16 { margin-top: 16px; }
    .line.mt24 { margin-top: 24px; }

    .muted { color: rgba(27, 27, 61, 0.5); font-style: italic; }
    .pop-red { color: var(--ss-red); }
    .pop-navy { color: var(--ss-navy-cta); }

    .step-label {
      display: inline-block;
      font-family: "Bangers", cursive;
      font-size: 38px;
      letter-spacing: 0.08em;
      color: var(--ss-navy);
      background: var(--ss-yellow);
      border: 2px solid var(--ss-black);
      border-radius: 10px;
      padding: 4px 16px;
      margin-bottom: 14px;
      box-shadow: 3px 3px 0 var(--ss-black);
    }

    .step-body {
      font-family: "Comic Neue", cursive;
      font-weight: 700;
      font-size: 52px;
      line-height: 1.2;
      letter-spacing: 0.01em;
      color: var(--ss-navy);
    }

    .step-sub {
      font-family: "Comic Neue", cursive;
      font-weight: 700;
      font-size: 36px;
      line-height: 1.25;
      color: rgba(27, 27, 61, 0.65);
      margin-top: 14px;
    }

    .sys-row {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sys-item {
      font-family: "Inter", sans-serif;
      font-weight: 900;
      font-size: 38px;
      letter-spacing: 0.01em;
      line-height: 1.15;
      color: var(--ss-navy);
      padding: 20px 28px;
      background: var(--ss-yellow);
      border: 2.5px solid var(--ss-black);
      border-radius: 16px;
      box-shadow: 4px 4px 0 var(--ss-black);
    }

    .ss-cta-panel {
      background: var(--ss-navy-cta);
      color: #fff;
      border: 3px solid var(--ss-black);
      border-radius: 24px;
      padding: 36px 32px;
      box-shadow: 6px 6px 0 var(--ss-black);
      text-align: center;
    }

    .ss-cta-panel .cta-main {
      font-family: "Comic Neue", cursive;
      font-weight: 700;
      font-size: 46px;
      line-height: 1.2;
    }

    .ss-cta-panel .cta-url {
      margin-top: 20px;
      font-weight: 900;
      font-size: 34px;
      color: var(--ss-yellow);
      letter-spacing: 0.02em;
    }

    .ss-cta-panel .cta-sub {
      margin-top: 12px;
      font-family: "Comic Neue", cursive;
      font-weight: 700;
      font-size: 28px;
      color: var(--ss-sky);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ——— Slide 7: full-frame poster ——— */
    .stage.s7-poster {
      background: var(--ss-black);
      display: flex;
      align-items: stretch;
    }

    .stage.s7-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ——— Nav + dots ——— */
    .nav-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }

    .nav-row button {
      background: var(--ss-cream);
      border: 2px solid var(--ss-black);
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--ss-black);
      font-family: "Inter", sans-serif;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      max-width: 400px;
    }

    .dots button {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 2px solid var(--ss-black);
      background: #fff;
      cursor: pointer;
      padding: 0;
    }

    .dots button.on {
      background: var(--ss-red);
      transform: scale(1.15);
    }

    .caption-panel {
      margin-top: 18px;
      max-width: 540px;
      width: 100%;
    }

    .caption-panel summary {
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: var(--ss-navy);
      margin-bottom: 8px;
      font-family: "Comic Neue", cursive;
    }

    .caption-panel pre {
      font-family: "Inter", monospace;
      font-size: 11px;
      line-height: 1.5;
      color: var(--ss-navy);
      white-space: pre-wrap;
      word-break: break-word;
      background: #fff;
      padding: 12px;
      border-radius: 10px;
      border: 2px solid var(--ss-black);
      box-shadow: 3px 3px 0 rgba(0,0,0,0.12);
    }

    /* ——— Export mode ——— */
    #ig-export-root {
      display: none;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      position: relative;
    }

    body.ss-export-mode {
      padding: 0;
      background: #111;
    }

    body.ss-export-mode > *:not(#ig-export-root) { display: none !important; }
    body.ss-export-mode #ig-export-root { display: block !important; }

    /* ——— Slide number badge ——— */
    .slide-badge {
      position: absolute;
      bottom: 116px;
      right: 44px;
      font-family: "Bangers", cursive;
      font-size: 32px;
      letter-spacing: 0.05em;
      color: rgba(27, 27, 61, 0.35);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="ig-export-root" aria-hidden="true"></div>

  <h1>🦥 Books &amp; Offers — High-Converting Carousels (10 slides)</h1>
  <p class="hint">Swipe ↔ · 18 offers · Slide 7 = poster · 1080×1350 native</p>

  <div class="controls">
    <label>
      Offer
      <select id="reelSelect" aria-label="Choose offer"></select>
    </label>
    <button type="button" id="btnPng" title="Current slide as PNG">PNG this slide</button>
  </div>

  <div class="carousel-wrap" id="carouselWrap">
    <div class="carousel-viewport" id="viewport">
      <div class="carousel-track" id="track"></div>
    </div>
  </div>

  <div class="nav-row">
    <button type="button" id="btnPrev">← Prev</button>
    <button type="button" id="btnNext">Next →</button>
  </div>
  <div class="dots" id="dots" aria-label="Slides"></div>

  <div class="caption-panel">
    <details open>
      <summary>IG caption for this offer</summary>
      <pre id="captionBox"></pre>
    </details>
  </div>

  <script>
    const STAGE_W = 1080;
    const STAGE_H = 1350;

    const SLOTH_LOGO =
      location.protocol === "http:" || location.protocol === "https:"
        ? "/images/slothlogo.png"
        : new URL("../public/images/slothlogo.png", location.href).href;

    function posterSrc(filename) {
      return location.protocol === "http:" || location.protocol === "https:"
        ? `/marketing/generated-books-grid/${filename}`
        : new URL(`generated-books-grid/${filename}`, location.href).href;
    }

    const zPath = "M8 12H32L12 28H32";
    function zSvg(cls) {
      return `<svg class="ss-z ${cls}" viewBox="0 0 40 40" aria-hidden="true"><path d="${zPath}" /></svg>`;
    }

    function stageShell(innerHtml, slideNum) {
      return `
        <div class="stage">
          <div class="ss-zlayer" aria-hidden="true">
            ${zSvg("a")}${zSvg("b")}${zSvg("c")}${zSvg("d")}
          </div>
          <header class="ss-header">
            <div class="ss-logo-ring">
              <img src="${SLOTH_LOGO}" width="62" height="62" alt="" decoding="async" />
            </div>
            <div>
              <p class="ss-brand-line">STRATEGIC SLOTH</p>
              <p class="ss-brand-sub">🌴 Calm systems · Lazy income</p>
            </div>
          </header>
          <main class="ss-main">
            <div class="ss-card">
              <div class="ss-card-inner">${innerHtml}</div>
            </div>
          </main>
          <span class="slide-badge">${slideNum}/10</span>
          <footer class="ss-footer">
            <span class="ss-footer-emoji" aria-hidden="true">🦥</span>
            <span class="ss-footer-url">strategicsloth.com</span>
          </footer>
        </div>`;
    }

    function slideS1(s) {
      const words = s.headline.split(" ");
      const mid = Math.ceil(words.length / 2);
      const top = words.slice(0, mid).join(" ");
      const bot = words.slice(mid).join(" ");
      const sub = s.sub ? `<div class="line t44 muted mt16">${s.sub}</div>` : "";
      return stageShell(
        `<div class="line t60">${top}</div>` +
        (bot ? `<div class="line t60 mt8">${bot}</div>` : "") +
        sub,
        1
      );
    }

    function slideText(s, num) {
      const sub = s.sub ? `<div class="step-sub">${s.sub}</div>` : "";
      return stageShell(`<div class="step-body">${s.headline}</div>${sub}`, num);
    }

    function slideSystem(s, num) {
      const rows = (s.lines || []).map(l => `<div class="sys-item">${l}</div>`).join("");
      return stageShell(`<div class="sys-row">${rows}</div>`, num);
    }

    function slidePoster(poster, num) {
      return `<div class="stage s7-poster">
        <img src="${posterSrc(poster)}" alt="Product poster" />
      </div>`;
    }

    function slideSoftCta(s, num) {
      return stageShell(
        `<div class="ss-cta-panel">
          <div class="cta-main">${s.headline}</div>
        </div>`,
        num
      );
    }

    function slideHardCta(s) {
      return stageShell(
        `<div class="ss-cta-panel">
          <div class="cta-main">${s.headline}</div>
          <div class="cta-url">${s.sub}</div>
          <div class="cta-sub">↗ ${s.cta || "link in bio"}</div>
        </div>`,
        10
      );
    }

    function buildSlides(entry) {
      const { poster, slides: S } = entry;
      return [
        slideS1(S.s1),
        slideText(S.s2, 2),
        slideText(S.s3, 3),
        slideText(S.s4, 4),
        slideText(S.s5, 5),
        slideSystem(S.s6, 6),
        slidePoster(poster, 7),
        slideText(S.s8, 8),
        slideSoftCta(S.s9, 9),
        slideHardCta(S.s10),
      ];
    }

    function buildCaption(entry) {
      const { title, price, url, slides: S } = entry;
      return `${title} — ${S.s5.headline}\n\n${S.s6.lines ? S.s6.lines.map((l, i) => `${i + 1}. ${l}`).join("\n") : ""}\n\n${S.s8.headline}\n\n${title} (${price}) → ${url}\n\nstrategicsloth.com`;
    }

    /* ——— COPY DATA (inline, loaded from fetch below for export mode) ——— */
    const COPY_URL =
      location.protocol === "http:" || location.protocol === "https:"
        ? "/marketing/data/books-offers-carousel-copy.json"
        : new URL("data/books-offers-carousel-copy.json", location.href).href;

    async function init() {
      const data = await fetch(COPY_URL).then(r => r.json());

      const REELS = data.map((entry, idx) => ({
        id: 401 + idx,
        slug: entry.id,
        title: entry.title,
        caption: buildCaption(entry),
        slides: buildSlides(entry),
      }));

      const select = document.getElementById("reelSelect");
      REELS.forEach((r, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = `${r.id} — ${r.title}`;
        select.appendChild(opt);
      });

      const track  = document.getElementById("track");
      const dotsEl = document.getElementById("dots");
      let current  = 0;
      let reelIdx  = 0;

      function scaleFactor() {
        const wrap = document.getElementById("carouselWrap");
        const w = wrap.offsetWidth;
        // Return 1 if wrap is hidden (export mode collapses it to 0)
        return w > 0 ? w / STAGE_W : 1;
      }

      function applyScale() {
        const sf = scaleFactor();
        document.querySelectorAll(".stage").forEach(s => {
          // Never scale the export root — Playwright must screenshot at 1:1
          if (s.closest("#ig-export-root")) return;
          s.style.transform = `scale(${sf})`;
        });
      }

      function buildDots(count) {
        dotsEl.innerHTML = "";
        for (let i = 0; i < count; i++) {
          const b = document.createElement("button");
          b.type = "button";
          b.setAttribute("aria-label", `Slide ${i + 1}`);
          b.addEventListener("click", () => goTo(i));
          dotsEl.appendChild(b);
        }
      }

      function updateDots(idx) {
        dotsEl.querySelectorAll("button").forEach((b, i) =>
          b.classList.toggle("on", i === idx)
        );
      }

      function goTo(idx) {
        current = idx;
        track.style.transform = `translateX(-${idx * 100}%)`;
        updateDots(idx);
      }

      function loadReel(idx) {
        reelIdx = idx;
        current = 0;
        const reel = REELS[idx];
        track.innerHTML = "";
        reel.slides.forEach(html => {
          const slide = document.createElement("div");
          slide.className = "slide";
          slide.innerHTML = html;
          track.appendChild(slide);
        });
        applyScale();
        buildDots(reel.slides.length);
        goTo(0);
        document.getElementById("captionBox").textContent = reel.caption;
        select.value = idx;
      }

      select.addEventListener("change", e => loadReel(Number(e.target.value)));
      document.getElementById("btnPrev").addEventListener("click", () =>
        goTo(Math.max(0, current - 1))
      );
      document.getElementById("btnNext").addEventListener("click", () =>
        goTo(Math.min(REELS[reelIdx].slides.length - 1, current + 1))
      );

      new ResizeObserver(applyScale).observe(document.getElementById("carouselWrap"));

      loadReel(0);

      /* ——— PNG export button ——— */
      document.getElementById("btnPng").addEventListener("click", async () => {
        const s = track.querySelectorAll(".slide")[current];
        const stage = s.querySelector(".stage");
        if (!stage) return;
        const canvas = await window.html2canvas(stage, {
          width: STAGE_W, height: STAGE_H,
          scale: 1, useCORS: true, allowTaint: true, logging: false,
        });
        const a = document.createElement("a");
        a.download = `${REELS[reelIdx].slug}-slide-${String(current + 1).padStart(2, "0")}.png`;
        a.href = canvas.toDataURL("image/png");
        a.click();
      });

      /* ——— Export mode (Playwright) ——— */
      const sp = new URLSearchParams(location.search);
      if (sp.has("export")) {
        document.body.classList.add("ss-export-mode");
        const rId = Number(sp.get("reelId")) || 401;
        const sIdx = Number(sp.get("slideIdx")) || 0;
        const ri = REELS.findIndex(r => r.id === rId);
        const reel = REELS[ri >= 0 ? ri : 0];
        const root = document.getElementById("ig-export-root");
        root.innerHTML = "";
        const slide = document.createElement("div");
        slide.style.cssText = "width:1080px;height:1350px;overflow:hidden;position:relative;";
        slide.innerHTML = reel.slides[sIdx] ?? reel.slides[0];
        root.appendChild(slide);
        // applyScale() is guarded to skip #ig-export-root, so no manual override needed.
        // Signal Playwright that this slide is fully rendered.
        window.ssExportReady = true;
      }
    }

    init().catch(console.error);
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" referrerpolicy="no-referrer" defer></script>
</body>
</html>
