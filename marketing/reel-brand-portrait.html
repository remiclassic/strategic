<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Strategic Sloth — Reel (portrait · yellow brand)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    :root {
      --yellow: #f2d65a;
      --yellow-mid: #e8d48b;
      --yellow-deep: #c4a84a;
      --ink: #14120d;
      --cream: #fff9e6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0b;
      color: var(--ink);
      font-family: "DM Sans", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      padding-bottom: 100px;
    }

    .toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px 12px;
      padding: 10px 12px 14px;
      font-size: 11px;
      color: #9a9a9e;
      background: linear-gradient(to top, rgba(10, 10, 11, 0.97), rgba(10, 10, 11, 0.88));
      border-top: 1px solid #2a2a2e;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .toolbar button {
      background: #1e1e22;
      border: 1px solid #3a3a40;
      color: #eee;
      padding: 7px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
    }

    .toolbar button:hover {
      border-color: var(--yellow-mid);
      color: var(--yellow-mid);
    }

    .toolbar button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }

    .toolbar input[type="checkbox"] {
      accent-color: var(--yellow-deep);
    }

    body.export-video {
      padding: 0;
      padding-bottom: 0;
      min-height: 100vh;
      overflow: hidden;
      justify-content: center;
      align-items: center;
    }

    body.export-video .toolbar {
      display: none !important;
    }

    body.export-video .viewport {
      width: 1080px;
      height: 1920px;
      max-height: none;
      max-width: none;
      border-radius: 0;
      box-shadow: none;
      margin: 0;
    }

    .viewport {
      position: relative;
      width: min(100vw - 24px, (100vh - 130px) * (9 / 16));
      aspect-ratio: 9 / 16;
      max-height: calc(100vh - 130px);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.55);
    }

    .stage {
      position: absolute;
      inset: 0;
      width: 1080px;
      height: 1920px;
      transform-origin: top left;
      overflow: hidden;
      transition: background 0.12s ease-out;
    }

    .stage.bg-yellow {
      background: linear-gradient(165deg, var(--yellow) 0%, var(--yellow-mid) 48%, var(--yellow-deep) 100%);
    }

    .stage.bg-yellow::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 90% 55% at 50% -5%, rgba(255, 255, 255, 0.45), transparent 52%);
      pointer-events: none;
    }

    .stage.bg-black {
      background: linear-gradient(180deg, #121214 0%, #0a0a0c 55%, #060607 100%);
    }

    .grain {
      position: absolute;
      inset: -15%;
      opacity: 0.06;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: drift 10s linear infinite;
    }

    .stage.bg-yellow .grain {
      opacity: 0.04;
    }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to { transform: translate(-2%, -2%); }
    }

    .brand-bar {
      position: absolute;
      left: 56px;
      top: 100px;
      width: 56px;
      height: 5px;
      background: var(--ink);
      border-radius: 2px;
      z-index: 3;
      opacity: 0.85;
    }

    .stage.bg-black .brand-bar {
      background: var(--yellow-mid);
    }

    .sloth-mark {
      position: absolute;
      right: 48px;
      bottom: 56px;
      width: 112px;
      height: auto;
      z-index: 3;
      opacity: 0.92;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.15));
    }

    .stage.bg-black .sloth-mark {
      filter: drop-shadow(0 2px 12px rgba(0, 0, 0, 0.5));
    }

    .safe-zones {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .safe-zones.on {
      opacity: 1;
    }

    .safe-zones svg {
      width: 100%;
      height: 100%;
    }

    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 56px 140px;
      text-align: left;
      z-index: 2;
    }

    .cover-wrap {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100%;
    }

    .line {
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 1.02;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.24s ease-out, transform 0.24s ease-out;
    }

    .line.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .stage.bg-yellow .line {
      color: var(--ink);
    }

    .stage.bg-black .line {
      color: var(--cream);
    }

    .line.t1 { font-size: 86px; }
    .line.t2 { font-size: 72px; }
    .line.t3 { font-size: 64px; line-height: 1.08; }
    .line.t4 { font-size: 96px; }
    .line.t-cta { font-size: 52px; text-transform: none; letter-spacing: 0.02em; font-weight: 800; }
    .line.t-url {
      font-size: 44px;
      text-transform: none;
      letter-spacing: 0.04em;
      font-weight: 700;
      margin-top: 20px;
    }

    .stage.bg-yellow .line.t-url {
      color: #3d3200;
      border-bottom: 4px solid var(--ink);
      display: inline-block;
      padding-bottom: 6px;
    }

    .line.t-sub {
      font-size: 28px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
      margin-top: 24px;
      opacity: 0;
    }

    .line.t-sub.visible {
      opacity: 1;
    }

    .stage.bg-yellow .line.t-sub {
      color: rgba(20, 18, 13, 0.72);
    }

    .notw {
      color: #8b1c1c;
    }

    .stage.bg-black .notw {
      color: #ff6b6b;
    }

    .cover-title {
      font-size: 118px;
      font-weight: 900;
      letter-spacing: 0.02em;
      line-height: 0.92;
      text-transform: uppercase;
      color: var(--ink);
    }

    .cover-sub {
      margin-top: 16px;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: rgba(20, 18, 13, 0.55);
      text-transform: uppercase;
    }

    .cover-tag {
      margin-top: 56px;
      font-size: 40px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--ink);
      text-transform: none;
      letter-spacing: 0.01em;
      max-width: 920px;
    }

    .flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
    }

    .flash.hit {
      animation: flash 0.09s ease-out;
    }

    @keyframes flash {
      0% { opacity: 0.2; }
      100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .grain { animation: none; }
      .line {
        transition: opacity 0.12s ease-out;
        transform: none;
      }
      .flash.hit { animation: none; }
    }
  </style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="stage bg-yellow" id="stage">
      <div class="grain" aria-hidden="true"></div>
      <div class="brand-bar" aria-hidden="true"></div>
      <img class="sloth-mark" src="../public/images/slothlogo.png" width="224" height="224" alt="" />
      <div class="safe-zones" id="safeZones" aria-hidden="true">
        <svg viewBox="0 0 1080 1920" preserveAspectRatio="none">
          <rect x="48" y="200" width="984" height="1520" fill="none" stroke="#c4a84a" stroke-width="2" stroke-dasharray="12 10" opacity="0.65" />
          <rect x="64" y="280" width="952" height="1360" fill="none" stroke="#f2f0ea" stroke-width="1" stroke-dasharray="6 8" opacity="0.35" />
        </svg>
      </div>
      <div class="flash" id="flash"></div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-row">
      <button type="button" id="btnPlay">Play</button>
      <button type="button" id="btnRestart">Restart (R)</button>
      <button type="button" id="btnCover">Cover</button>
      <button type="button" id="btnPng" title="1080×1920 PNG of current frame">PNG</button>
      <span id="timeLabel">0.0s / 14s</span>
    </div>
    <div class="toolbar-row">
      <label><input type="checkbox" id="chkLoop" /> Loop</label>
      <label><input type="checkbox" id="chkAuto" /> Auto-play</label>
      <label><input type="checkbox" id="chkSafe" /> Safe zones</label>
      <label><input type="checkbox" id="chkSound" /> Sound</label>
    </div>
    <div class="toolbar-row" style="width:100%;justify-content:center;opacity:0.85;font-size:10px;">
      Portrait 9∶16 · matches Instagram grid yellow/black · open via local server if logo PNG export fails (CORS)
    </div>
  </div>

  <script>
    const STAGE_W = 1080;
    const STAGE_H = 1920;

    const qs = new URLSearchParams(location.search);
    const exportVideo = qs.get("export") === "video";
    const exportCoverMs = Math.min(6000, Math.max(0, parseInt(qs.get("cover") || "900", 10) || 0));
    const exportEndHoldMs = Math.min(8000, Math.max(0, parseInt(qs.get("end") || "1400", 10) || 0));

    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const motionMult = reduceMotion ? 1.25 : 1;
    const staggerBase = reduceMotion ? 0 : 200;

    function scaleMs(ms) {
      return Math.round(ms * motionMult);
    }

    /**
     * bg: "yellow" | "black"
     * lines: { cls, html, delay, marginTop?, noUpper?, extraClass? }
     */
    const scenes = [
      {
        bg: "yellow",
        ms: 820,
        lines: [
          { cls: "t1", html: "I SPENT", delay: 0 },
          { cls: "t1", html: "18 YEARS", delay: staggerBase, marginTop: "14px" },
        ],
        sfx: "cut",
      },
      {
        bg: "yellow",
        ms: 820,
        lines: [
          { cls: "t2", html: "BUILDING FOR", delay: 0 },
          { cls: "t2", html: "OTHER PEOPLE.", delay: staggerBase, marginTop: "14px" },
        ],
        sfx: "cut",
      },
      {
        bg: "black",
        ms: 880,
        lines: [
          { cls: "t2", html: "IT MADE THEM", delay: 0 },
          { cls: "t2", html: "RICH.", delay: staggerBase, marginTop: "14px" },
        ],
        sfx: "cut",
      },
      {
        bg: "yellow",
        ms: 900,
        lines: [{ cls: "t4", html: '<span class="notw">NOT</span> ME.', delay: 0 }],
        flash: !reduceMotion,
        sfx: "hit",
      },
      {
        bg: "black",
        ms: 1200,
        lines: [
          { cls: "t3", html: "NOBODY TELLS", delay: 0 },
          { cls: "t3", html: "YOU THIS:", delay: staggerBase, marginTop: "12px" },
        ],
        sfx: "cut",
      },
      {
        bg: "yellow",
        ms: 1350,
        lines: [
          { cls: "t3", html: "JOB SECURITY", delay: 0 },
          { cls: "t3", html: "IS A TRAP.", delay: staggerBase, marginTop: "14px" },
        ],
        sfx: "cut",
      },
      {
        bg: "black",
        ms: 1550,
        lines: [
          { cls: "t3", html: "SO I BUILT", delay: 0 },
          { cls: "t3", html: "SOMETHING ONCE.", delay: staggerBase, marginTop: "14px" },
        ],
        sfx: "cut",
      },
      {
        bg: "yellow",
        ms: 1750,
        lines: [
          { cls: "t3", html: "NOW IT SELLS", delay: 0 },
          { cls: "t3", html: "WHILE I SLEEP.", delay: staggerBase, marginTop: "14px" },
        ],
        sfx: "cut",
      },
      {
        bg: "yellow",
        ms: 3200,
        lines: [
          { cls: "line t-cta", html: "Same lazy-smart system →", delay: 0, noUpper: true },
          { cls: "line t-url", html: "strategicsloth.com", delay: staggerBase, noUpper: true },
          { cls: "line t-sub", html: "link in bio", delay: Math.round(staggerBase * 1.2), noUpper: true },
        ],
        sfx: "cta",
      },
    ];

    const scaledScenes = scenes.map((s) => ({
      ...s,
      ms: scaleMs(s.ms),
      lines: s.lines.map((ln) => ({
        ...ln,
        delay: scaleMs(ln.delay),
      })),
    }));

    const totalMs = scaledScenes.reduce((a, s) => a + s.ms, 0);
    const contentEl = document.getElementById("content");
    const flashEl = document.getElementById("flash");
    const stageEl = document.getElementById("stage");
    const viewportEl = document.getElementById("viewport");
    const timeLabel = document.getElementById("timeLabel");
    const btnPlay = document.getElementById("btnPlay");
    const btnRestart = document.getElementById("btnRestart");
    const btnCover = document.getElementById("btnCover");
    const btnPng = document.getElementById("btnPng");
    const chkLoop = document.getElementById("chkLoop");
    const chkAuto = document.getElementById("chkAuto");
    const chkSafe = document.getElementById("chkSafe");
    const chkSound = document.getElementById("chkSound");
    const safeZonesEl = document.getElementById("safeZones");

    let playing = false;
    let cancelToken = 0;
    let audioCtx = null;

    timeLabel.textContent = `0.0s / ${(totalMs / 1000).toFixed(0)}s`;

    function scaleStage() {
      const r = viewportEl.getBoundingClientRect();
      const s = Math.min(r.width / STAGE_W, r.height / STAGE_H);
      stageEl.style.transform = `scale(${s})`;
    }

    new ResizeObserver(scaleStage).observe(viewportEl);
    scaleStage();

    function setStageBg(bg) {
      stageEl.classList.remove("bg-yellow", "bg-black");
      stageEl.classList.add(bg === "black" ? "bg-black" : "bg-yellow");
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
      return audioCtx;
    }

    function playSfx(kind) {
      if (!chkSound.checked) return;
      const ctx = ensureAudio();
      const t = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.value = 0.1;
      master.connect(ctx.destination);

      if (kind === "hit") {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine";
        o.frequency.setValueAtTime(62, t);
        o.frequency.exponentialRampToValueAtTime(40, t + 0.14);
        g.gain.setValueAtTime(0.001, t);
        g.gain.exponentialRampToValueAtTime(0.65, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
        o.connect(g);
        g.connect(master);
        o.start(t);
        o.stop(t + 0.26);
      } else if (kind === "cta") {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine";
        o.frequency.setValueAtTime(220, t);
        o.frequency.exponentialRampToValueAtTime(146, t + 0.2);
        g.gain.setValueAtTime(0.001, t);
        g.gain.exponentialRampToValueAtTime(0.4, t + 0.03);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        o.connect(g);
        g.connect(master);
        o.start(t);
        o.stop(t + 0.32);
      } else {
        const bufferSize = ctx.sampleRate * 0.055;
        const noise = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = noise.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.32;
        const src = ctx.createBufferSource();
        src.buffer = noise;
        const bp = ctx.createBiquadFilter();
        bp.type = "lowpass";
        bp.frequency.value = 1100;
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.001, t);
        g.gain.exponentialRampToValueAtTime(0.75, t + 0.008);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        src.connect(bp);
        bp.connect(g);
        g.connect(master);
        src.start(t);
        src.stop(t + 0.065);
      }
    }

    function triggerFlash() {
      if (reduceMotion) return;
      flashEl.classList.remove("hit");
      void flashEl.offsetWidth;
      flashEl.classList.add("hit");
    }

    function showCover() {
      btnPlay.textContent = "Play";
      timeLabel.textContent = `0.0s / ${(totalMs / 1000).toFixed(0)}s`;
      setStageBg("yellow");
      contentEl.innerHTML = `
        <div class="cover-wrap">
          <div class="cover-title">18 YEARS</div>
          <div class="cover-sub">For them</div>
          <p class="cover-tag">Job security is a trap.</p>
        </div>
      `;
    }

    function revealLine(el) {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => el.classList.add("visible"));
      });
    }

    function runScene(scene) {
      contentEl.innerHTML = "";
      setStageBg(scene.bg);
      return new Promise((resolve) => {
        scene.lines.forEach((ln) => {
          setTimeout(() => {
            const div = document.createElement("div");
            div.className = ln.noUpper ? ln.cls : `line ${ln.cls}`;
            if (ln.marginTop) div.style.marginTop = ln.marginTop;
            if (ln.extraClass) div.classList.add(ln.extraClass);
            div.innerHTML = ln.html;
            contentEl.appendChild(div);
            revealLine(div);
          }, ln.delay);
        });
        setTimeout(resolve, scene.ms);
      });
    }

    async function runReel(token) {
      let elapsed = 0;
      for (let i = 0; i < scaledScenes.length; i++) {
        if (token !== cancelToken) return;
        const sc = scaledScenes[i];
        if (sc.flash) triggerFlash();
        if (sc.sfx) playSfx(sc.sfx);

        await runScene(sc);
        if (token !== cancelToken) return;

        elapsed += sc.ms;
        timeLabel.textContent = `${(elapsed / 1000).toFixed(1)}s / ${(totalMs / 1000).toFixed(0)}s`;
      }

      timeLabel.textContent = `${(totalMs / 1000).toFixed(1)}s / ${(totalMs / 1000).toFixed(0)}s`;
      playing = false;
      btnPlay.textContent = chkLoop.checked ? "Play again" : "Play";

      if (token !== cancelToken) return;
      if (chkLoop.checked) {
        playing = true;
        btnPlay.textContent = "Playing…";
        await new Promise((r) => setTimeout(r, scaleMs(450)));
        if (token !== cancelToken) return;
        contentEl.innerHTML = "";
        await runReel(token);
      } else if (exportVideo) {
        await new Promise((r) => setTimeout(r, exportEndHoldMs));
        if (token !== cancelToken) return;
        window.dispatchEvent(new CustomEvent("ss-reel-complete"));
      }
    }

    function start() {
      cancelToken += 1;
      const token = cancelToken;
      playing = true;
      btnPlay.textContent = "Playing…";
      timeLabel.textContent = `0.0s / ${(totalMs / 1000).toFixed(0)}s`;
      contentEl.innerHTML = "";
      if (chkSound.checked) ensureAudio();
      runReel(token);
    }

    function restart() {
      cancelToken += 1;
      playing = false;
      showCover();
    }

    btnPlay.addEventListener("click", () => {
      if (playing) return;
      start();
    });

    btnRestart.addEventListener("click", restart);
    btnCover.addEventListener("click", () => {
      if (playing) cancelToken += 1;
      playing = false;
      showCover();
    });

    chkSafe.addEventListener("change", () => {
      safeZonesEl.classList.toggle("on", chkSafe.checked);
    });

    btnPng.addEventListener("click", async () => {
      if (typeof html2canvas !== "function") {
        alert("html2canvas failed to load. Check your network and refresh.");
        return;
      }
      const safeWasOn = chkSafe.checked;
      safeZonesEl.classList.remove("on");
      chkSafe.checked = false;
      btnPng.disabled = true;
      try {
        const canvas = await html2canvas(stageEl, {
          scale: 1,
          width: STAGE_W,
          height: STAGE_H,
          useCORS: true,
          backgroundColor: null,
          logging: false,
        });
        canvas.toBlob((blob) => {
          if (!blob) return;
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = `strategic-sloth-reel-brand-portrait-${Date.now()}.png`;
          a.click();
          URL.revokeObjectURL(a.href);
        }, "image/png");
      } catch (e) {
        console.error(e);
        alert("PNG export failed. Serve the site over http://localhost so the logo loads, or check the console.");
      } finally {
        btnPng.disabled = false;
        if (safeWasOn) {
          chkSafe.checked = true;
          safeZonesEl.classList.add("on");
        }
      }
    });

    document.addEventListener("keydown", (e) => {
      if (exportVideo) return;
      if (e.key === "r" || e.key === "R") restart();
      if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        if (!playing) start();
      }
    });

    if (exportVideo) {
      document.body.classList.add("export-video");
      chkLoop.checked = false;
      chkSound.checked = false;
    } else {
      showCover();
    }

    async function runExportVideo() {
      await document.fonts.ready;
      await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
      scaleStage();
      if (exportCoverMs > 0) {
        showCover();
        scaleStage();
        await new Promise((r) => setTimeout(r, exportCoverMs));
      }
      start();
    }

    window.addEventListener("load", () => {
      if (exportVideo) {
        runExportVideo();
        return;
      }
      if (chkAuto.checked) start();
    });
  </script>
</body>
</html>
